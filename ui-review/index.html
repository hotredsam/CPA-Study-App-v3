function SectionBadge({ section, size = 'sm' }) {

  const sizes = { xs:{h:18,fz:9,px:6}, sm:{h:22,fz:10,px:8}, md:{h:26,fz:11,px:10}, lg:{h:32,fz:13,px:14} };
  const s = sizes[size];
  return <span className="mono" style={{
    display:'inline-flex', alignItems:'center', justifyContent:'center',
    height:s.h, padding:`0 ${s.px}px`, borderRadius:3,
    fontSize:s.fz, letterSpacing:'0.08em', fontWeight:600,
    color:`oklch(0.42 0.10 ${h})`, background:`oklch(0.70 0.06 ${h} / 0.22)`,
    border:`1px solid oklch(0.55 0.08 ${h} / 0.35)`, textTransform:'uppercase',
  }}>{section}</span>;
}

function Score({ value, size='md', suffix='/10' }) {
  if (value == null) return <span className="mono dim">—</span>;
  const sz = { sm:14, md:20, lg:32, xl:56 }[size];
  const tone = value >= 7.5 ? 'var(--good)' : value >= 5 ? 'var(--warn)' : 'var(--bad)';
  return <span className="mono tabular" style={{ fontSize:sz, fontWeight:500, color:tone, letterSpacing:'-0.02em' }}>
    {value.toFixed ? value.toFixed(1) : value}
    <span style={{ color:'var(--ink-faint)', fontSize:sz*0.5, marginLeft:2 }}>{suffix}</span>
  </span>;
}

    case 'lock':   return <svg {...p}><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>;
    case 'mic-on': return <svg {...p}><rect x="9" y="3" width="6" height="11" rx="3" fill="currentColor" stroke="none"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>;
    case 'refresh': return <svg {...p}><path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M3 21v-5h5"/></svg>;
    case 'link': return <svg {...p}><path d="M10 14a5 5 0 0 1 0-7l3-3a5 5 0 0 1 7 7l-2 2M14 10a5 5 0 0 1 0 7l-3 3a5 5 0 0 1-7-7l2-2"/></svg>;

function Kbd({ children }) {

function AutoGrowTextarea({ defaultValue='', placeholder, minHeight=56, maxHeight=480, style, value, onChange, ...rest }) {
  const ref = React.useRef(null);
  const resize = () => {
    const el = ref.current; if (!el) return;
    el.style.height = 'auto';
    el.style.height = Math.min(Math.max(el.scrollHeight, minHeight), maxHeight) + 'px';
  };
  React.useEffect(() => { resize(); }, [value]);
  const controlled = value !== undefined;
  return <textarea
    ref={ref}
    {...(controlled ? { value, onChange: (e)=>{ onChange?.(e); resize(); } } : { defaultValue })}
    placeholder={placeholder}
    spellCheck={false}
    onInput={resize}
    style={{
      width:'100%', minHeight, padding:12, border:'1px solid var(--border)', borderRadius:3,
      background:'var(--surface-2)', fontFamily:'var(--font-mono)', fontSize:12, color:'var(--ink)',
      resize:'none', lineHeight:1.55, overflow:'hidden', ...style
    }}
    {...rest}
  />;
}

function Card({ children, pad=18, style, onClick, title, accent, id }) {
  return <div id={id} onClick={onClick} title={title} className={onClick?'hov':''} style={{
    background:'var(--surface)', border:'1px solid var(--border)', borderRadius:4,
    padding:pad, cursor:onClick?'pointer':'default', position:'relative', ...(style||{})
  }}>
    {accent ? <div style={{ position:'absolute', left:0, top:0, bottom:0, width:2, background:accent }}/> : null}
    {children}
  </div>;
}

function EyebrowHeading({ eyebrow, title, right, sub }) {
  return <header style={{ display:'flex', alignItems:'flex-end', gap:20, marginBottom:20 }}>

      {sub ? <div style={{ marginTop:8, color:'var(--ink-dim)', fontSize:13, maxWidth:820, lineHeight:1.5 }}>{sub}</div> : null}
    </div>
    {right ? <div style={{ flexShrink:0 }}>{right}</div> : null}
  </header>;
}

function Divider({ vertical, style }) {
  if (vertical) return <div style={{ width:1, alignSelf:'stretch', background:'var(--border)', ...(style||{}) }}/>;
  return <div style={{ height:1, background:'var(--border)', ...(style||{}) }}/>;
}

function Tabs({ value, onChange, items }) {
  return <div style={{ display:'flex', gap:2, borderBottom:'1px solid var(--border)', marginBottom:18 }}>
    {items.map(it => {
      const on = value === it.id;
      return <button key={it.id} onClick={()=>onChange(it.id)} className="hov" style={{
        padding:'10px 16px', cursor:'pointer',
        borderBottom: `2px solid ${on?'var(--accent)':'transparent'}`,
        color: on?'var(--ink)':'var(--ink-dim)',
        fontSize:13, fontWeight: on?500:400,
        marginBottom:-1, display:'flex', alignItems:'center', gap:6,
      }}>
        {it.label}
        {it.badge != null ? <span className="mono tabular" style={{
          fontSize:10, padding:'1px 6px', borderRadius:8,
          background: on?'var(--accent)':'var(--surface-2)',
          color: on?'#fff':'var(--ink-faint)',
        }}>{it.badge}</span> : null}
      </button>;
    })}
  </div>;
}

function Toggle({ on, onChange }) {
  return <button onClick={()=>onChange(!on)} style={{
    width:32, height:18, borderRadius:9, background: on?'var(--accent)':'var(--border-hi)',
    border:'none', cursor:'pointer', position:'relative', flexShrink:0,
  }}>
    <div style={{ position:'absolute', top:2, left: on?16:2, width:14, height:14, borderRadius:7, background:'#fff', transition:'left .15s' }}/>
  </button>;
}

function fmtDur(sec) { if (sec==null) return '—'; const m=Math.floor(sec/60),s=Math.floor(sec%60); return `${m}:${String(s).padStart(2,'0')}`; }
function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-US',{month:'short', day:'numeric'}); }
function relTime(iso) { const d=(Date.now()-new Date(iso).getTime())/1000; if (d<60) return 'now'; if (d<3600) return `${Math.floor(d/60)}m ago`; if (d<86400) return `${Math.floor(d/3600)}h ago`; return `${Math.floor(d/86400)}d ago`; }
function daysUntil(iso) {
  if (iso === 'TBD' || !iso) return null;
  const d = Math.ceil((new Date(iso).getTime() - Date.now()) / (1000*60*60*24));
  return d;
}

Object.assign(window, { SectionBadge, Score, Bar, Btn, Icon, Kbd, Logo, Card, EyebrowHeading, Divider, Tabs, Toggle, fmtDur, fmtDate, relTime, daysUntil });

function ScreenRecord({ nav }) {
  const [phase, setPhase] = React.useState('setup');
  const [elapsed, setElapsed] = React.useState(0);
  const [mic, setMic] = React.useState('mic_shure');
  const [source, setSource] = React.useState('display1');
  const [sections, setSections] = React.useState(['FAR']);
  const [model, setModel] = React.useState('anthropic/claude-sonnet-4.6');
  const [paused, setPaused] = React.useState(false);
  const [uploadPct, setUploadPct] = React.useState(0);
  const [micLevel, setMicLevel] = React.useState(0.6);

  React.useEffect(() => {
    if (phase !== 'recording' || paused) return;
    const t = setInterval(()=>setElapsed(e=>e+1), 1000);
    return ()=>clearInterval(t);
  }, [phase, paused]);

  React.useEffect(() => {
    const t = setInterval(()=>setMicLevel(0.3 + Math.random()*0.55), 180);
    return ()=>clearInterval(t);
  }, []);

  React.useEffect(() => {
    if (phase !== 'uploading') return;
    const t = setInterval(()=>setUploadPct(p=>{
      if (p >= 100) { clearInterval(t); setTimeout(()=>nav('pipeline'), 400); return 100; }
      return p + 2.3;
    }), 80);
    return ()=>clearInterval(t);
  }, [phase, nav]);

  const toggleSection = (s) => setSections(prev =>
    prev.includes(s) ? prev.filter(x=>x!==s) : [...prev, s]);

  if (phase === 'recording') return <Cockpit elapsed={elapsed} paused={paused} togglePause={()=>setPaused(p=>!p)} onStop={()=>{setPhase('uploading'); setUploadPct(0);}} sections={sections} micLevel={micLevel}/>;
  if (phase === 'uploading') return <UploadPanel pct={uploadPct} elapsed={elapsed} sections={sections} model={model}/>;

  const preflightOk = sections.length > 0 && source && mic;

  return <div>
    <EyebrowHeading
      eyebrow="NEW RECORDING"
      title="Preflight"
      sub="Capture screen + mic. Claude will segment the video into questions, transcribe your reasoning, and grade each one."
    />

    <div style={{ display:'grid', gridTemplateColumns:'1fr 340px', gap:16 }}>
      <Card pad={0}>
        <Group label="1 · Screen capture" hint="Chooses what gets recorded">
          {[
            { id:'display1', label:'Display 1 — full screen', meta:'2560 × 1440 · 144 Hz · primary' },
            { id:'display2', label:'Display 2 — full screen', meta:'1920 × 1080 · 60 Hz' },
            { id:'window',   label:'Chrome — Becker Practice', meta:'Window 4182 · currently focused' },
            { id:'browser',  label:'Browser window',           meta:'All tabs in the active window' },
          ].map(s => <Picker key={s.id} active={source===s.id} onClick={()=>setSource(s.id)} icon="screen" label={s.label} meta={s.meta}/>)}
        </Group>
        <Divider/>
        <Group label="2 · Microphone" hint="Verbal reasoning is graded from this">
          {[
            { id:'mic_shure', label:'Shure MV7+ (USB)',       meta:'48 kHz · default', lvl:0.62 },

function Group({ label, hint, children }) {

function Picker({ active, onClick, icon, label, meta, level, tag }) {
  const bars = React.useMemo(() => Array.from({length:8}).map(()=>Math.random()), [level==null]);
  return <button onClick={onClick} className="hov" style={{
    width:'100%', padding:'10px 12px', display:'flex', alignItems:'center', gap:10,
    background: active ? 'var(--accent-faint)' : 'var(--surface)',
    border: `1px solid ${active ? 'var(--accent-border)' : 'var(--border)'}`,
    borderRadius:3, cursor:'pointer', marginBottom:6, textAlign:'left',
  }}>
    {icon ? <div style={{ width:26, height:26, borderRadius:3, background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center', color: active?'var(--accent)':'var(--ink-dim)' }}><Icon name={icon} size={14}/></div> : null}
    <div style={{ flex:1, minWidth:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
        <span style={{ fontSize:13, color:'var(--ink)' }}>{label}</span>
        {tag ? <span className="mono" style={{ fontSize:9, padding:'2px 5px', borderRadius:2, background:'var(--accent-faint)', color:'var(--accent)', textTransform:'uppercase', letterSpacing:'0.08em' }}>{tag}</span> : null}
      </div>

    </div>
    {level != null ? <div style={{ width:36, height:14, display:'flex', alignItems:'center', gap:1 }}>{bars.map((b,i)=>(<div key={i} style={{ width:2, height:Math.max(3, 14 * Math.min(1, b*level*1.8)), background: i<level*8?'var(--accent)':'var(--border-hi)' }}/>))}</div> : null}

}

function Check({ ok, label, sub }) {

const STAGES = [
  { id:'uploading',    label:'Upload' },
  { id:'segmenting',   label:'Segment' },
  { id:'extracting',   label:'Extract' },
  { id:'transcribing', label:'Transcribe' },
  { id:'tagging',      label:'Tag' },

];

function PipelineCard({ p, onOpen }) {
  const stageIdx = STAGES.findIndex(s => s.id === p.stage);
  return <Card pad={0}>
    <div style={{ padding:'14px 18px', display:'grid', gridTemplateColumns:'auto 1fr auto auto', gap:14, alignItems:'center', borderBottom:'1px solid var(--border)' }}>
      <div style={{ display:'flex', gap:4 }}>{p.sections.map(s => <SectionBadge key={s} section={s} size="md"/>)}</div>
      <div>
        <div style={{ fontSize:14, color:'var(--ink)', fontWeight:500 }}>{p.title}</div>
        <div className="mono" style={{ fontSize:11, color:'var(--ink-faint)', marginTop:2 }}>{p.id} · ended {new Date(p.startedMs).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})} · started processing {relTime(new Date(p.startedMs).toISOString())}</div>
      </div>
      <div style={{ textAlign:'right' }}>
        <div className="mono tabular" style={{ fontSize:12, color:'var(--ink)' }}>{p.questionsDone}/{p.questionsTotal || '?'} questions</div>
        <div className="mono" style={{ fontSize:11, color:'var(--ink-faint)', marginTop:2 }}>~{Math.floor(p.etaSec/60)}m {p.etaSec%60}s left</div>
      </div>
      <PipelineMenu onOpen={onOpen} p={p}/>
    </div>
    <div style={{ padding:'16px 18px' }}>
      <div style={{ display:'grid', gridTemplateColumns:`repeat(${STAGES.length}, 1fr)`, gap:2 }}>
        {STAGES.map((s, i) => {
          const state = i < stageIdx ? 'done' : i === stageIdx ? 'running' : 'pending';
          const pct = i < stageIdx ? 100 : i === stageIdx ? p.stagePct : 0;
          return <div key={s.id}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
              <div style={{
                width:14, height:14, borderRadius:7,
                background: state==='done'?'var(--good)':state==='running'?'var(--accent)':'var(--surface-2)',
                border: state==='pending' ? '1px solid var(--border-hi)' : 'none',
                display:'flex', alignItems:'center', justifyContent:'center', color:'#fff',
              }}>
                {state==='done' ? <Icon name="check" size={9} color="#fff"/> : state==='running' ? <span className="pulse-dot" style={{ width:6, height:6, background:'#fff', borderRadius:3 }}/> : null}
              </div>
              <div className="mono" style={{ fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', color: state==='pending'?'var(--ink-faint)':'var(--ink)' }}>{s.label}</div>
            </div>
            <Bar pct={pct} height={3} accent={state==='done'?'var(--good)':'var(--accent)'}/>
          </div>;
        })}
      </div>
      {p.questionsTotal > 0 ? (
        <div style={{ marginTop:14, display:'flex', gap:4, flexWrap:'wrap' }}>
          {Array.from({length:p.questionsTotal}).map((_,i) => {
            const done = i < p.questionsDone;
            const active = i === p.questionsDone;
            return <div key={i} className="mono tabular" style={{
              width:26, height:22, borderRadius:3, display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:10, fontWeight:600,
              background: done?'var(--good-soft)':active?'var(--accent-faint)':'var(--surface-2)',
              color: done?'var(--good)':active?'var(--accent)':'var(--ink-faint)',
              border: `1px solid ${done?'var(--good-border)':active?'var(--accent-border)':'var(--border)'}`,
            }}>{i+1}</div>;
          })}
        </div>
      ) : null}
    </div>
  </Card>;
}

function PipelineMenu({ onOpen, p }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);
  const items = [
    { k:'open',    label:'Open full preview',  hint:'Open detailed pipeline view',  action:onOpen },
    { k:'logs',    label:'View logs',           hint:'Live process stream',           action:()=>{} },
    { k:'pause',   label:'Pause pipeline',      hint:'Resume anytime',                action:()=>{} },
    { k:'notify',  label:'Notify when done',    hint:`ETA ~${Math.floor(p.etaSec/60)}m`, action:()=>{} },
    { k:'rerun',   label:'Re-run grading',      hint:'Keeps transcript, regrades',    action:()=>{} },
    { k:'cancel',  label:'Cancel & discard',    hint:'Permanent',                     action:()=>{}, danger:true },
  ];
  return <div ref={ref} style={{ position:'relative' }}>
    <Btn size="sm" variant="ghost" onClick={()=>setOpen(o=>!o)} icon={<Icon name="chevron-down" size={13}/>}>Preview</Btn>
    {open && <div style={{
      position:'absolute', top:'calc(100% + 4px)', right:0, zIndex:50,
      width:240, background:'var(--surface)', border:'1px solid var(--border)', borderRadius:4,
      boxShadow:'0 6px 20px oklch(0.20 0 0 / 0.08)', padding:4,
    }}>
      {items.map((it, i) => <button key={it.k} className="hov" onClick={()=>{ setOpen(false); it.action(); }} style={{
        width:'100%', display:'block', padding:'8px 10px', background:'transparent', border:'none',
        textAlign:'left', cursor:'pointer', borderRadius:3,
        color: it.danger?'var(--bad)':'var(--ink)',
        borderTop: i===items.length-1?'1px solid var(--border)':'none',
        marginTop: i===items.length-1?4:0, paddingTop: i===items.length-1?10:8,
      }}>
        <div style={{ fontSize:12 }}>{it.label}</div>
        <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)', marginTop:1 }}>{it.hint}</div>
      </button>)}
    </div>}
  </div>;
}

          {q.wasCorrect ? '● Correct' : '● Incorrect'}
        </span>
      </span>}
      sub="Jump between questions with the selector above. Sources are shown full-text below with the parts relevant to this question highlighted."
      right={<Btn size="sm" variant="ghost" icon={<Icon name="arrow-left" size={13}/>} onClick={()=>setRecId(null)}>All recordings</Btn>}
    />

    {/* Question selector bar - top */}
    <QuestionSelector session={session} current={selected} onSelect={setSelected}/>

    <div style={{ display:'flex', flexDirection:'column', gap:14, marginTop:14 }}>
      <div style={{ display:'grid', gridTemplateColumns:'1.1fr 1fr', gap:14 }}>
        <ScoreCard q={q}/>
        <FeedbackCard q={q} compact/>
      </div>
      <QuestionCard q={q}/>
      <TranscriptCard q={q}/>
      <FlowchartCard q={q}/>
      <SourcesCard q={q} nav={nav}/>
      <AIChat q={q}/>
    </div>
  </div>;
}

function QuestionSelector({ session, current, onSelect }) {
  const scrollerRef = React.useRef(null);
  React.useEffect(() => {
    if (!scrollerRef.current) return;
    const el = scrollerRef.current.querySelector(`[data-q="${current}"]`);
    if (el && el.parentElement) {
      el.parentElement.scrollLeft = el.offsetLeft - el.parentElement.clientWidth/2 + el.offsetWidth/2;
    }
  }, [current]);
  return <Card pad={0}>
    <div style={{ padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
      <Btn variant="ghost" size="sm" icon={<Icon name="arrow-left" size={12}/>} onClick={()=>onSelect(Math.max(1, current-1))}>Prev</Btn>
      <div ref={scrollerRef} style={{ flex:1, overflowX:'auto', display:'flex', gap:2, padding:'2px 0' }}>
        {session.map(q => {
          const active = q.idx === current;
          const bg = q.correct ? 'var(--good-soft)' : 'var(--bad-soft)';
          const bc = q.correct ? 'var(--good-border)' : 'var(--bad-border)';
          const col = q.correct ? 'var(--good)' : 'var(--bad)';
          return <button key={q.idx} data-q={q.idx} onClick={()=>onSelect(q.idx)} title={`Q${q.idx} · ${q.topic} · ${q.score}/10`} className="hov" style={{
            flexShrink:0, width:32, height:40, borderRadius:3, cursor:'pointer',
            background: active ? col : bg,
            border: `1px solid ${active ? col : bc}`,
            color: active ? '#fff' : col,
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            fontFamily:'var(--font-mono)', fontSize:11, fontWeight:600,
          }}>
            <span>{q.idx}</span>
            <span style={{ fontSize:9, fontWeight:400, opacity:0.85 }}>{q.score}</span>
          </button>;
        })}
      </div>
      <span className="mono tabular" style={{ fontSize:11, color:'var(--ink-dim)' }}>{current}/{session.length}</span>
      <Btn variant="ghost" size="sm" onClick={()=>onSelect(Math.min(session.length, current+1))}>Next <Icon name="arrow-right" size={12}/></Btn>
    </div>
  </Card>;
}

function QuestionCard({ q }) {
  return <Card pad={22}>
    <div style={{ display:'flex', gap:8, marginBottom:14, alignItems:'center' }}>
      <SectionBadge section="FAR" size="sm"/>
      <span className="mono" style={{ fontSize:11, color:'var(--ink-faint)' }}>{q.topic}</span>
      <span style={{ flex:1 }}/>
      <span className="mono tabular" style={{ fontSize:11, color:'var(--ink-dim)' }}>{fmtDur(q.durationSec)}</span>
    </div>
    <p style={{ fontSize:15, lineHeight:1.55, color:'var(--ink)', margin:0 }}>{q.question}</p>
    <div style={{ marginTop:18, display:'flex', flexDirection:'column', gap:6 }}>
      {q.choices.map(c => {
        const isCorrect = c.key === q.correctAnswer;
        const isUser = c.key === q.userAnswer;
        const bg = isCorrect ? 'var(--good-soft)' : isUser ? 'var(--bad-soft)' : 'var(--surface)';
        const border = isCorrect ? 'var(--good-border)' : isUser ? 'var(--bad-border)' : 'var(--border)';
        return <div key={c.key} style={{ padding:'10px 12px', display:'flex', gap:12, alignItems:'flex-start', background:bg, border:`1px solid ${border}`, borderRadius:3 }}>
          <span className="mono" style={{ fontSize:11, fontWeight:600, width:16, color: isCorrect?'var(--good)':isUser?'var(--bad)':'var(--ink-faint)' }}>{c.key}</span>
          <span style={{ flex:1, fontSize:13, color:'var(--ink)' }}>{c.text}</span>
          {isCorrect ? <span className="mono" style={{ fontSize:10, color:'var(--good)', fontWeight:600 }}>CORRECT</span> : null}
          {isUser && !isCorrect ? <span className="mono" style={{ fontSize:10, color:'var(--bad)', fontWeight:600 }}>YOUR ANSWER</span> : null}
        </div>;
      })}
    </div>
  </Card>;
}

function TranscriptCard({ q }) {
  return <Card>
    <div className="mono eyebrow">YOUR SPOKEN REASONING · TRANSCRIPT</div>
    <p style={{ fontSize:14, lineHeight:1.75, color:'var(--ink-dim)', margin:'8px 0 0', fontFamily:'var(--font-serif)', fontStyle:'italic' }}>"{q.transcript}"</p>
    <div style={{ marginTop:14, display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:8 }}>
      {[
        { k:'Hedges', v:3, tone:'warn' }, { k:'Fillers', v:7, tone:'ink-dim' },
        { k:'Self-corrects', v:2, tone:'good' }, { k:'Words / sec', v:'2.8', tone:'ink-dim' },
      ].map(s => <div key={s.k} style={{ padding:'8px 10px', background:'var(--surface-2)', borderRadius:3 }}>
        <div className="mono eyebrow">{s.k}</div>
        <div className="mono tabular" style={{ fontSize:16, color:`var(--${s.tone})`, marginTop:2 }}>{s.v}</div>
      </div>)}
    </div>
  </Card>;
}

function FlowchartCard({ q }) {
  const firstWrong = q.flowchart.findIndex(s => !s.ok);
  const hasDivergence = firstWrong !== -1;
  return <Card>
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
      <div className="mono eyebrow">REASONING PATHS · ASC 606 5-step</div>
      <span className="mono" style={{ fontSize:10, color:'var(--ink-faint)' }}>
        {hasDivergence ? <>diverged at <span style={{ color:'var(--bad)' }}>step {firstWrong+1}</span></> : 'on path throughout'}
      </span>
    </div>
    {hasDivergence && <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginTop:14, marginBottom:8 }}>
      <BranchHeader kind="user"/>
      <BranchHeader kind="correct"/>
    </div>}
    <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
      {q.flowchart.map((step, i) => {
        const last = i === q.flowchart.length-1;
        const diverged = hasDivergence && i >= firstWrong;
        return <div key={step.id}>
          {diverged ? <SplitStep step={step} last={last}/> : <SharedStep step={step} last={last}/>}
          {!last && <StepConnector diverging={hasDivergence && i === firstWrong-1} split={diverged}/>}
        </div>;
      })}
    </div>
  </Card>;
}

function BranchHeader({ kind }) {
  const isUser = kind==='user';
  return <div style={{
    padding:'8px 12px', borderRadius:3,
    background: isUser ? 'var(--bad-soft)' : 'var(--good-soft)',
    border: `1px solid ${isUser ? 'var(--bad-border)' : 'var(--good-border)'}`,
    display:'flex', alignItems:'center', gap:8,
  }}>
    <div style={{ width:14, height:14, borderRadius:7, background: isUser?'var(--bad)':'var(--good)', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <Icon name={isUser?'user':'check'} size={9} color="#fff"/>
    </div>
    <span className="mono" style={{ fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', color: isUser?'var(--bad)':'var(--good)', fontWeight:600 }}>
      {isUser ? 'YOUR PATH' : 'CORRECT PATH'}
    </span>
  </div>;
}

function SharedStep({ step, last }) {
  return <div style={{ display:'grid', gridTemplateColumns:'200px 1fr 160px', gap:12, alignItems:'center' }}>
    <StepPill step={step} variant="ok"/>
    <div style={{ fontSize:12, color:'var(--ink-dim)', lineHeight:1.5 }}>{step.detail}</div>
    <CitationBadge cite={step.cited}/>
  </div>;
}

function SplitStep({ step, last }) {
  return <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
    <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
      <StepPill step={step} variant="user"/>
      <div style={{ fontSize:11.5, color:'var(--ink-dim)', lineHeight:1.5, padding:'0 2px' }}>{step.userDetail || step.detail}</div>
      {step.userMisstep && <div style={{
        fontSize:11, color:'var(--bad)', lineHeight:1.5, padding:'6px 9px',
        background:'var(--bad-soft)', border:'1px dashed var(--bad-border)', borderRadius:2,
      }}>
        <span className="mono" style={{ fontSize:9, letterSpacing:'0.08em', textTransform:'uppercase', opacity:0.8 }}>misstep · </span>
        {step.userMisstep}
      </div>}
    </div>
    <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
      <StepPill step={step} variant="correct"/>
      <div style={{ fontSize:11.5, color:'var(--ink-dim)', lineHeight:1.5, padding:'0 2px' }}>{step.detail}</div>
      <CitationBadge cite={step.cited} align="left"/>
    </div>
  </div>;
}

function StepPill({ step, variant }) {
  const palette = {
    ok:      { bg:'var(--good-soft)', bd:'var(--good-border)', fg:'var(--good)', dot:'var(--good)', icon:'check' },
    user:    { bg:'var(--bad-soft)',  bd:'var(--bad-border)',  fg:'var(--bad)',  dot:'var(--bad)',  icon:'x' },
    correct: { bg:'var(--good-soft)', bd:'var(--good-border)', fg:'var(--good)', dot:'var(--good)', icon:'check' },
  }[variant];
  const [eyebrow, title] = step.label.split('\n');
  return <div style={{
    padding:'10px 12px', borderRadius:3,
    background: palette.bg, border: `1px solid ${palette.bd}`,
    fontSize:12, lineHeight:1.4, fontWeight:500,
  }}>
    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
      <div style={{ width:13, height:13, borderRadius:7, background: palette.dot, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <Icon name={palette.icon} size={8} color="#fff"/>
      </div>
      <span className="mono" style={{ fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', color: palette.fg }}>{eyebrow}</span>
    </div>
    <div style={{ fontSize:12.5, color:'var(--ink)', fontWeight:500 }}>{title || ''}</div>
  </div>;
}

function CitationBadge({ cite, align='right' }) {
  const jump = (e) => {
    e.stopPropagation();
    const el = document.getElementById('sources-card');
    if (el) {
      const rect = el.getBoundingClientRect();
      const top = window.scrollY + rect.top - 80;
      window.scrollTo({ top, behavior:'smooth' });
    }
    window.dispatchEvent(new CustomEvent('servant:highlight-source', { detail:{ cite }}));
  };
  return <div style={{ textAlign: align }}>
    <button onClick={jump} title="Jump to this citation in Sources" className="mono hov" style={{
      fontSize:10, color:'var(--accent)', padding:'3px 7px',
      background:'var(--accent-faint)', border:'1px solid var(--accent-border)', borderRadius:2,
      display:'inline-flex', alignItems:'center', gap:4, cursor:'pointer'
    }}>
      {cite} <Icon name="arrow-right" size={9} color="var(--accent)"/>
    </button>
  </div>;
}

function StepConnector({ diverging, split }) {
  if (diverging) {
    // Single line splits into two
    return <div style={{ height:22, position:'relative', margin:'2px 0' }}>
      <svg width="100%" height="22" style={{ display:'block' }} preserveAspectRatio="none" viewBox="0 0 400 22">
        <path d="M 200 0 L 200 8 L 100 14 L 100 22" fill="none" stroke="var(--bad)" strokeWidth="1.5" strokeDasharray="3 3"/>
        <path d="M 200 0 L 200 8 L 300 14 L 300 22" fill="none" stroke="var(--good)" strokeWidth="1.5"/>
      </svg>
    </div>;
  }
  if (split) {
    return <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, height:18 }}>
      <div style={{ display:'flex', justifyContent:'center' }}><div style={{ width:2, height:'100%', background:'var(--bad)', opacity:0.4 }}/></div>
      <div style={{ display:'flex', justifyContent:'center' }}><div style={{ width:2, height:'100%', background:'var(--good)'}}/></div>
    </div>;
  }
  return <div style={{ marginLeft:100, height:18, width:2, background:'var(--border-hi)' }}/>;
}

function ScoreCard({ q }) {
  return <Card>
    <div className="mono eyebrow">COMBINED SCORE</div>
    <div style={{ marginTop:10, display:'flex', alignItems:'baseline', gap:6 }}>
      <span className="mono tabular" style={{ fontSize:56, fontWeight:300, color: q.scores.combined>=7.5?'var(--good)':q.scores.combined>=5?'var(--warn)':'var(--bad)', letterSpacing:'-0.03em', lineHeight:1 }}>{q.scores.combined.toFixed(1)}</span>
      <span className="mono" style={{ fontSize:20, color:'var(--ink-faint)' }}>/10</span>
    </div>
    <div style={{ fontSize:11, color:'var(--ink-faint)', marginTop:4 }}>accounting + consulting · each out of 5</div>
    <Divider style={{ margin:'16px 0' }}/>
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
      <div>
        <div className="mono eyebrow">ACCOUNTING · /5</div>
        <div style={{ marginTop:4, display:'flex', alignItems:'baseline', gap:3 }}>
          <span className="mono tabular" style={{ fontSize:28, fontWeight:400, color:'var(--bad)', letterSpacing:'-0.02em' }}>{q.scores.accounting.toFixed(1)}</span>
          <span className="mono" style={{ fontSize:12, color:'var(--ink-faint)' }}>/5</span>
        </div>
        <Bar pct={(q.scores.accounting/5)*100} height={3} accent="var(--bad)"/>
      </div>
      <div>
        <div className="mono eyebrow">CONSULTING · /5</div>
        <div style={{ marginTop:4, display:'flex', alignItems:'baseline', gap:3 }}>
          <span className="mono tabular" style={{ fontSize:28, fontWeight:400, color:'var(--warn)', letterSpacing:'-0.02em' }}>{q.scores.consulting.toFixed(1)}</span>
          <span className="mono" style={{ fontSize:12, color:'var(--ink-faint)' }}>/5</span>
        </div>
        <Bar pct={(q.scores.consulting/5)*100} height={3} accent="var(--warn)"/>
      </div>
    </div>
    <div className="mono" style={{ fontSize:11, color:'var(--ink-faint)', marginTop:14, letterSpacing:'0.02em' }}>
      {q.scores.accounting.toFixed(1)} + {q.scores.consulting.toFixed(1)} = {q.scores.combined.toFixed(1)} / 10
    </div>
  </Card>;
}

function FeedbackCard({ q, compact }) {
  return <Card>
    <div className="mono eyebrow">ANALYSIS</div>
    <KVBlock label="ROOT-CAUSE GAP" value={q.feedback.gap}/>
    <KVBlock label="FIRST MISSTEP" value={q.feedback.misstep}/>
    <KVBlock label="CONSULTING TECHNIQUE" value={q.feedback.technique}/>
    <KVBlock label="STUDY NEXT" value={q.feedback.study} last/>
  </Card>;
}

function KVBlock({ label, value, last }) {
  return <div style={{ paddingBottom: last?0:12, marginBottom: last?0:12, borderBottom: last?'none':'1px solid var(--border)', marginTop:12 }}>
    <div className="mono eyebrow">{label}</div>
    <div style={{ fontSize:13, color:'var(--ink)', marginTop:4, lineHeight:1.5 }}>{value}</div>
  </div>;
}

function SourcesCard({ q, nav, compact }) {
  const [activeId, setActiveId] = React.useState(q.sources[0]?.id);
  const [modal, setModal] = React.useState(false);
  const [flash, setFlash] = React.useState(false);
  React.useEffect(() => {
    const onJump = (e) => {
      const cite = e.detail?.cite;
      if (!cite) return;
      const match = q.sources.find(s => cite.includes(s.ref?.split(' ')[0]) || cite.includes(s.textbook));
      if (match) setActiveId(match.id);
      setFlash(true);
      setTimeout(()=>setFlash(false), 1400);
    };
    window.addEventListener('servant:highlight-source', onJump);
    return () => window.removeEventListener('servant:highlight-source', onJump);
  }, [q.sources]);
  const sorted = [...q.sources].sort((a,b)=>b.relevance-a.relevance);
  const active = sorted.find(s => s.id === activeId) || sorted[0];
  return <Card pad={0} id="sources-card" style={{ boxShadow: flash ? '0 0 0 3px var(--accent-border)' : 'none', transition:'box-shadow .4s ease-out' }}>
    <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
      <div>
        <div className="mono eyebrow">SOURCES · {q.sources.length} CITED · full text with relevant parts highlighted</div>
        <div style={{ fontSize:11, color:'var(--ink-dim)', marginTop:3 }}>Retrieved from your indexed textbooks and past recordings. Highlights are the spans Claude judged most relevant to this question.</div>
      </div>
      <Btn size="sm" variant="ghost" icon={<Icon name="book-open" size={11}/>} onClick={()=>setModal(true)}>Open active source</Btn>
    </div>
    {modal && <SourceModal source={active} onClose={()=>setModal(false)} nav={nav}/>}
    <div style={{ display:'grid', gridTemplateColumns:'260px 1fr', minHeight:360 }}>
      {/* Left rail: source list */}
      <div style={{ borderRight:'1px solid var(--border)', background:'var(--surface-2)' }}>
        {sorted.map(s => {
          const on = s.id === active.id;
          return <button key={s.id} onClick={()=>setActiveId(s.id)} className="hov" style={{
            width:'100%', padding:'12px 14px', textAlign:'left', background: on?'var(--surface)':'transparent', border:'none',
            borderBottom:'1px solid var(--border)', borderLeft: on?'2px solid var(--accent)':'2px solid transparent',
            cursor:'pointer', display:'block',
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
              <Icon name={s.textbook.includes('recording')?'mic':s.textbook==='FASB ASC'?'lock':'book-open'} size={11} color={on?'var(--accent)':'var(--ink-faint)'}/>
              <div style={{ fontSize:12, color:'var(--ink)', fontWeight:on?600:500 }}>{s.textbook}</div>
              <span style={{ flex:1 }}/>
              <span className="mono tabular" style={{ fontSize:10, color: s.relevance>=0.9?'var(--good)':s.relevance>=0.8?'var(--warn)':'var(--ink-dim)' }}>{Math.round(s.relevance*100)}%</span>
            </div>
            <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)', lineHeight:1.45 }}>{s.ref}{s.page?` · p.${s.page}`:''}</div>
          </button>;
        })}
      </div>
      {/* Right: passage body */}
      <div style={{ padding:'18px 24px 24px', maxHeight:560, overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:10, marginBottom:6 }}>
          <div className="mono eyebrow" style={{ color:'var(--accent)' }}>{active.textbook}</div>
          <div className="mono" style={{ fontSize:11, color:'var(--ink-faint)' }}>{active.ref}{active.page?` · p.${active.page}`:''}</div>
          <span style={{ flex:1 }}/>
          <span className="mono" style={{ fontSize:10, color:'var(--ink-dim)' }}>relevance {Math.round(active.relevance*100)}%</span>
        </div>
        <PassageBody passage={active.passage}/>
        <div style={{ marginTop:18, padding:'10px 12px', background:'var(--surface-2)', border:'1px dashed var(--border-hi)', borderRadius:3, display:'flex', alignItems:'center', gap:10 }}>
          <Icon name="info" size={12} color="var(--ink-faint)"/>
          <span style={{ fontSize:11, color:'var(--ink-dim)', lineHeight:1.5 }}>
            Highlighted spans total <span className="mono tabular" style={{ color:'var(--accent)' }}>{countHighlights(active.passage)}</span> passages Claude selected as directly relevant. Click any source on the left to compare.
          </span>
        </div>
      </div>
    </div>
  </Card>;
}

function SourceModal({ source, onClose, nav }) {
  React.useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', h);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', h); document.body.style.overflow = ''; };
  }, []);
  return <div onClick={onClose} style={{
    position:'fixed', inset:0, zIndex:100, background:'oklch(0.15 0 0 / 0.45)',
    display:'flex', alignItems:'center', justifyContent:'center', padding:40,
    animation:'fade-in 0.15s ease-out',
  }}>
    <div onClick={e=>e.stopPropagation()} style={{
      width:'min(880px, 100%)', maxHeight:'calc(100vh - 80px)', display:'flex', flexDirection:'column',
      background:'var(--surface)', border:'1px solid var(--border)', borderRadius:4,
      boxShadow:'0 20px 60px oklch(0.15 0 0 / 0.2)',
    }}>
      <div style={{ padding:'16px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12 }}>
        <Icon name={source.textbook.includes('recording')?'mic':source.textbook==='FASB ASC'?'lock':'book-open'} size={14} color="var(--accent)"/>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14, color:'var(--ink)', fontWeight:500 }}>{source.textbook}</div>
          <div className="mono" style={{ fontSize:11, color:'var(--ink-faint)', marginTop:2 }}>
            {source.ref}{source.page?` · p.${source.page}`:''} · relevance {Math.round(source.relevance*100)}% · {countHighlights(source.passage)} highlights
          </div>
        </div>
        {nav && <Btn size="sm" variant="ghost" icon={<Icon name="external" size={11}/>} onClick={()=>{ onClose(); nav('textbook-view'); }}>Full textbook</Btn>}
        <Btn size="sm" variant="ghost" icon={<Icon name="x" size={12}/>} onClick={onClose}>Close</Btn>
      </div>
      <div style={{ padding:'22px 28px', overflowY:'auto', flex:1 }}>
        <PassageBody passage={source.passage}/>
      </div>
      <div style={{ padding:'10px 22px', borderTop:'1px solid var(--border)', background:'var(--surface-2)', display:'flex', alignItems:'center', gap:10 }}>
        <span className="mono" style={{ fontSize:10, color:'var(--ink-faint)' }}>ESC to close</span>
      </div>
    </div>
  </div>;
}

function countHighlights(passage) {
  return passage.reduce((n, b) => n + ((b.hl||[]).length), 0);
}

function PassageBody({ passage }) {
  return <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
    {passage.map((block, i) => {
      if (block.kind === 'h') {
        return <h4 key={i} style={{
          margin:'6px 0 2px', fontFamily:'var(--font-serif)', fontSize:18, fontWeight:500,
          color:'var(--ink)', letterSpacing:'-0.01em', lineHeight:1.25,
        }}>{block.t}</h4>;
      }
      return <p key={i} style={{
        margin:0, fontSize:13.5, lineHeight:1.7, color:'var(--ink-dim)',
        whiteSpace:'pre-wrap', fontFamily:'var(--font-serif)',
      }}>{renderWithHighlights(block.t, block.hl || [])}</p>;
    })}
  </div>;
}

function renderWithHighlights(text, ranges) {
  if (!ranges.length) return text;
  // sort ranges by start
  const sorted = [...ranges].sort((a,b)=>a[0]-b[0]);
  const out = [];
  let cursor = 0;
  sorted.forEach(([start, end], i) => {
    if (start > cursor) out.push(<span key={`t${i}`}>{text.slice(cursor, start)}</span>);
    out.push(<mark key={`h${i}`} style={{
      background:'var(--accent-faint)',
      color:'var(--ink)',
      padding:'1px 2px',
      borderRadius:2,
      boxShadow:'inset 0 -2px 0 var(--accent)',
    }}>{text.slice(start, end)}</mark>);
    cursor = end;
  });
  if (cursor < text.length) out.push(<span key="tail">{text.slice(cursor)}</span>);
  return out;
}

function AIChat({ q }) {
  const [msgs, setMsgs] = React.useState([
    { who:'ai', text:'I\'ve graded this question. Ask me anything about the allocation logic, the citations, or how to approach similar problems.' },
  ]);
  const [input, setInput] = React.useState('');
  const send = () => {
    if (!input.trim()) return;
    const userMsg = { who:'user', text:input };
    setMsgs(m => [...m, userMsg, { who:'ai', text:'thinking', thinking:true }]);
    setInput('');
    setTimeout(() => {
      setMsgs(m => m.filter(x=>!x.thinking).concat({
        who:'ai',
        text: 'The proportional rule from ASC 606-10-32-31 applies anytime the sum of observable standalone selling prices doesn\'t equal the transaction price — which happens often with bundled discounts. For your Orion example: equipment SSP 420 / total SSPs 500 = 84% share, applied to $480k = $403,200. Your reasoning hit the principle but you stopped at the division step ("420 plus 80 is 500, not 480"). The way to avoid this in future: always write the ratio explicitly before picking an answer.',
      }));
    }, 900);
  };
  return <Card pad={0}>
    <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
      <div className="mono eyebrow">ASK THE TUTOR · chat about this question</div>
      <span className="mono" style={{ fontSize:10, color:'var(--ink-faint)' }}>Claude Sonnet 4.6 · see sources</span>
    </div>
    <div style={{ padding:'14px 18px', display:'flex', flexDirection:'column', gap:10, maxHeight:320, overflowY:'auto' }}>
      {msgs.map((m, i) => <div key={i} style={{

        maxWidth:'82%', padding:'10px 12px', borderRadius:3,
        background: m.who==='user' ? 'var(--accent-faint)' : 'var(--surface-2)',
        border: `1px solid ${m.who==='user'?'var(--accent-border)':'var(--border)'}`,
        fontSize:13, color:'var(--ink)', lineHeight:1.55,
      }}>
        {m.thinking ? <span className="mono" style={{ color:'var(--ink-faint)' }}><span className="pulse-dot">●</span> thinking</span> : m.text}
      </div>)}
    </div>
    <div style={{ padding:'12px 14px', borderTop:'1px solid var(--border)', display:'flex', gap:8 }}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send();}} placeholder="e.g. Why doesn't the stated price work here?" style={{
        flex:1, height:34, padding:'0 12px', border:'1px solid var(--border)', borderRadius:3, background:'var(--surface-2)', fontSize:13, color:'var(--ink)',
      }}/>
      <Btn variant="primary" size="sm" icon={<Icon name="send" size={12}/>} onClick={send}>Ask</Btn>
    </div>
  </Card>;
}

// Topics — table + expandable rows w/ notes, history, update

function ScreenTopics({ nav }) {
  const [sectFilter, setSectFilter] = React.useState('all');
  const [unitFilter, setUnitFilter] = React.useState('all');
  const [masteryFilter, setMasteryFilter] = React.useState('all'); // all | low | mid | high
  const [errorFilter, setErrorFilter] = React.useState('all');     // all | high | mid | low
  const [cardsFilter, setCardsFilter] = React.useState('all');     // all | due | none
  const [seenFilter, setSeenFilter] = React.useState('all');       // all | new | active
  const [topicQuery, setTopicQuery] = React.useState('');
  const [sort, setSort] = React.useState({ key:'error', dir:'desc' });
  const [expanded, setExpanded] = React.useState(null);

  const setSortKey = (k) => setSort(s => s.key === k ? { key:k, dir: s.dir==='desc'?'asc':'desc' } : { key:k, dir: k==='mastery'?'asc':'desc' });

  const allUnits = Array.from(new Set(window.TOPICS.map(t=>t.unit))).sort();

  let items = window.TOPICS;
  if (sectFilter !== 'all') items = items.filter(t => t.section === sectFilter);
  if (unitFilter !== 'all') items = items.filter(t => t.unit === unitFilter);
  if (topicQuery.trim()) items = items.filter(t => t.name.toLowerCase().includes(topicQuery.trim().toLowerCase()));
  if (masteryFilter === 'low')  items = items.filter(t => t.mastery < 0.4);
  if (masteryFilter === 'mid')  items = items.filter(t => t.mastery >= 0.4 && t.mastery < 0.7);
  if (masteryFilter === 'high') items = items.filter(t => t.mastery >= 0.7);
  if (errorFilter === 'high') items = items.filter(t => (t.errorRate||0) > 0.5);
  if (errorFilter === 'mid')  items = items.filter(t => (t.errorRate||0) > 0.25 && (t.errorRate||0) <= 0.5);
  if (errorFilter === 'low')  items = items.filter(t => (t.errorRate||0) <= 0.25);
  if (cardsFilter === 'due')  items = items.filter(t => t.cardsDue > 0);
  if (cardsFilter === 'none') items = items.filter(t => t.cardsDue === 0);
  if (seenFilter === 'new')    items = items.filter(t => t.seen < 10);
  if (seenFilter === 'active') items = items.filter(t => t.seen >= 10);

  const cmp = (a,b) => {
    let v = 0;
    if (sort.key === 'section') v = a.section.localeCompare(b.section);
    else if (sort.key === 'name') v = a.name.localeCompare(b.name);
    else if (sort.key === 'unit') v = a.unit.localeCompare(b.unit);
    else if (sort.key === 'mastery') v = a.mastery - b.mastery;
    else if (sort.key === 'error') v = (a.errorRate||0) - (b.errorRate||0);
    else if (sort.key === 'cards') v = a.cardsDue - b.cardsDue;
    else if (sort.key === 'seen') v = a.seen - b.seen;
    return sort.dir === 'desc' ? -v : v;
  };
  items = [...items].sort(cmp);

  const activeFilterCount =
    (sectFilter!=='all'?1:0) + (unitFilter!=='all'?1:0) + (masteryFilter!=='all'?1:0) +
    (errorFilter!=='all'?1:0) + (cardsFilter!=='all'?1:0) + (seenFilter!=='all'?1:0) + (topicQuery.trim()?1:0);

  const clearAll = () => {
    setSectFilter('all'); setUnitFilter('all'); setMasteryFilter('all');
    setErrorFilter('all'); setCardsFilter('all'); setSeenFilter('all'); setTopicQuery('');
  };

  return <div>
    <EyebrowHeading
      eyebrow="TOPICS"
      title="Topics extracted by Claude from your textbooks"
      sub={`${window.TOPICS.length} topics tracked across ${window.TEXTBOOKS.length} indexed books. Click a row to open notes, history, and re-index actions.`}
      right={<div style={{ display:'flex', gap:8, alignItems:'center' }}>
        <span className="mono" style={{ fontSize:11, color:'var(--ink-faint)' }}>
          {items.length} of {window.TOPICS.length} shown{activeFilterCount?` · ${activeFilterCount} filter${activeFilterCount>1?'s':''}`:''}
        </span>
        {activeFilterCount>0 && <Btn size="sm" variant="ghost" icon={<Icon name="x" size={11}/>} onClick={clearAll}>Clear</Btn>}
        <Btn size="sm" variant="ghost" icon={<Icon name="sparkle" size={12}/>} onClick={()=>{
          const hasQueue = window.__ai_notes_queue > 0;
          window.__ai_notes_queue = items.length;
          window.dispatchEvent(new CustomEvent('servant:toast', { detail:{ msg:`Queued AI notes refresh for ${items.length} topic${items.length===1?'':'s'} · ~$${(items.length*0.003).toFixed(2)} estimated`, kind:'ok' }}));
        }}>Refresh AI notes for all</Btn>
        <Btn size="sm" variant="subtle" icon={<Icon name="play" size={12}/>} onClick={()=>{
          window.dispatchEvent(new CustomEvent('servant:toast', { detail:{ msg:`Re-indexing ${items.length} topic${items.length===1?'':'s'} against textbooks · check Pipeline`, kind:'ok' }}));
        }}>Process all shown</Btn>
      </div>}
    />
    <Card pad={0}>
      <div style={{ display:'grid', gridTemplateColumns:'72px 1fr 120px 160px 130px 90px 90px 24px', gap:10, padding:'10px 14px', borderBottom:'1px solid var(--border)', background:'var(--surface-2)' }}>
        <ColHeader label="SECT" sortKey="section" sort={sort} onSort={setSortKey}>
          <ColFilter value={sectFilter} onChange={setSectFilter} options={[['all','All'],['FAR','FAR'],['REG','REG'],['AUD','AUD'],['TCP','TCP'],['BAR','BAR'],['ISC','ISC']]}/>
        </ColHeader>
        <ColHeader label="TOPIC" sortKey="name" sort={sort} onSort={setSortKey}>
          <ColSearch value={topicQuery} onChange={setTopicQuery} placeholder="Search topics…"/>
        </ColHeader>
        <ColHeader label="UNIT" sortKey="unit" sort={sort} onSort={setSortKey}>
          <ColFilter value={unitFilter} onChange={setUnitFilter} options={[['all','All units'], ...allUnits.map(u=>[u,u])]}/>
        </ColHeader>
        <ColHeader label="MASTERY" sortKey="mastery" sort={sort} onSort={setSortKey}>
          <ColFilter value={masteryFilter} onChange={setMasteryFilter} options={[['all','Any'],['low','< 40% · weak'],['mid','40–70%'],['high','≥ 70% · strong']]}/>
        </ColHeader>
        <ColHeader label="ERROR RATE" sortKey="error" sort={sort} onSort={setSortKey}>
          <ColFilter value={errorFilter} onChange={setErrorFilter} options={[['all','Any'],['high','> 50% · bad'],['mid','25–50%'],['low','≤ 25% · good']]}/>
        </ColHeader>
        <ColHeader label="CARDS" sortKey="cards" sort={sort} onSort={setSortKey}>
          <ColFilter value={cardsFilter} onChange={setCardsFilter} options={[['all','Any'],['due','Has due'],['none','None due']]}/>
        </ColHeader>
        <ColHeader label="SEEN" sortKey="seen" sort={sort} onSort={setSortKey}>
          <ColFilter value={seenFilter} onChange={setSeenFilter} options={[['all','Any'],['new','< 10 · new'],['active','≥ 10 · active']]}/>
        </ColHeader>
        <div/>
      </div>
      {items.length === 0 ? <div style={{ padding:'40px 20px', textAlign:'center', color:'var(--ink-faint)', fontSize:13 }}>
        No topics match these filters. <button onClick={clearAll} style={{ background:'none', border:'none', color:'var(--accent)', textDecoration:'underline', cursor:'pointer', font:'inherit' }}>Clear all</button>
      </div> : items.map((t,i) => <TopicRow key={t.id} t={t} last={i===items.length-1} open={expanded===t.id} onToggle={()=>setExpanded(expanded===t.id?null:t.id)} nav={nav}/>)}
    </Card>
  </div>;
}

function ColHeader({ label, sortKey, sort, onSort, children }) {
  const active = sort.key === sortKey;
  const arrow = active ? (sort.dir==='desc' ? '↓' : '↑') : '';
  return <div style={{ display:'flex', flexDirection:'column', gap:4, minWidth:0 }}>
    <button onClick={()=>onSort(sortKey)} className="hov" style={{
      background:'transparent', border:'none', padding:0, textAlign:'left', cursor:'pointer',
      display:'flex', alignItems:'center', gap:4,
      color: active?'var(--accent)':'var(--ink-faint)',
    }}>
      <span className="mono" style={{ fontSize:10, letterSpacing:'0.08em', fontWeight:500 }}>{label}</span>
      <span className="mono" style={{ fontSize:10, opacity: active?1:0.35 }}>{arrow || '↕'}</span>
    </button>
    {children}
  </div>;
}

function ColFilter({ value, onChange, options }) {
  const active = value !== 'all';
  return <select value={value} onChange={e=>onChange(e.target.value)} style={{
    width:'100%', padding:'3px 4px',

    fontFamily:'var(--font-mono)', fontSize:10.5, color: active?'var(--accent)':'var(--ink-dim)',
    cursor:'pointer', minWidth:0,
  }}>
    {options.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
  </select>;
}

function ColSearch({ value, onChange, placeholder }) {
  const active = value.trim().length > 0;
  return <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{
    width:'100%', padding:'3px 6px',

function ScreenStudyTextbook({ nav }) {
  const [view, setView] = React.useState('home'); // 'home' | 'reader'
  const [chunkIdx, setChunkIdx] = React.useState(0);
  const [quizAnswer, setQuizAnswer] = React.useState(null);
  const [submitted, setSubmitted] = React.useState(false);
  const chunks = window.STUDY_CHUNKS;

  if (view === 'home') {
    return <StudyTextbookHome
      chunks={chunks}
      onResume={() => { setView('reader'); }}
      onJump={(i) => { setChunkIdx(i); setSubmitted(false); setQuizAnswer(null); setView('reader'); }}
      nav={nav}
    />;
  }

  const chunk = chunks[chunkIdx];
  const pct = ((chunkIdx + (submitted?1:0.5)) / chunks.length) * 100;

  const next = () => {
    if (chunkIdx < chunks.length - 1) {
      setChunkIdx(chunkIdx+1); setQuizAnswer(null); setSubmitted(false);
    }
  };

  return <div>
    <EyebrowHeading
      eyebrow={`STUDY · ${chunk.chapter}`}
      title={chunk.title}
      sub="Claude reads a few pages at a time, then quizzes you before advancing. Progress is tracked per chunk."
      right={<div style={{ display:'flex', gap:8 }}>
        <Btn variant="ghost" size="sm" icon={<Icon name="arrow-left" size={13}/>} onClick={()=>setView('home')}>Back to study home</Btn>
        <Btn variant="ghost" size="sm" icon={<Icon name="book" size={13}/>} onClick={()=>nav('textbook-view')}>Open raw book</Btn>
        <Btn variant="ghost" size="sm" icon={<Icon name="note" size={13}/>}>Notes</Btn>
      </div>}
    />

    <Card pad={0} style={{ marginBottom:14 }}>
      <div style={{ padding:'12px 18px', display:'flex', alignItems:'center', gap:14 }}>
        <SectionBadge section="FAR" size="sm"/>
        <span className="mono" style={{ fontSize:11, color:'var(--ink-dim)' }}>Chunk {chunkIdx+1} of {chunks.length} · {chunk.estMin}m read</span>
        <span style={{ flex:1 }}/>
        <span className="mono tabular" style={{ fontSize:11, color:'var(--ink-dim)' }}>{Math.round(pct)}% through unit</span>
      </div>
      <Bar pct={pct} height={3}/>
    </Card>

    <div style={{ display:'grid', gridTemplateColumns:'1fr 320px', gap:14 }}>
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <Card pad={32} style={{ background:'var(--surface)' }}>
          <div className="mono eyebrow">§ {chunk.ref}</div>
          <h2 style={{ fontFamily:'var(--font-serif)', fontSize:28, fontWeight:500, color:'var(--ink)', margin:'6px 0 18px', letterSpacing:'-0.01em' }}>{chunk.title}</h2>
          <div style={{ fontFamily:'var(--font-serif)', fontSize:16, lineHeight:1.75, color:'var(--ink)' }}>
            {chunk.body.map((para, i) => <p key={i} style={{ margin:'0 0 14px' }}>{para}</p>)}
          </div>
          {chunk.callout ? <div style={{ margin:'18px 0', padding:'14px 18px', background:'var(--accent-faint)', borderLeft:'3px solid var(--accent)', borderRadius:3 }}>
            <div className="mono eyebrow" style={{ color:'var(--accent)' }}>{chunk.callout.type}</div>
            <div style={{ fontSize:14, color:'var(--ink)', marginTop:6, lineHeight:1.6 }}>{chunk.callout.text}</div>
          </div> : null}
          {chunk.example ? <div style={{ margin:'18px 0', padding:'16px 18px', background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:3 }}>
            <div className="mono eyebrow">WORKED EXAMPLE</div>
            <div style={{ fontFamily:'var(--font-serif)', fontSize:14, color:'var(--ink-dim)', marginTop:8, lineHeight:1.65 }}>{chunk.example}</div>
          </div> : null}
        </Card>

        <Card>
          <div className="mono eyebrow">CHECKPOINT · {submitted?'ANSWER REVEALED':'ANSWER BEFORE CONTINUING'}</div>
          <h3 style={{ fontSize:16, color:'var(--ink)', margin:'10px 0 14px', fontWeight:500, lineHeight:1.45 }}>{chunk.quiz.q}</h3>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {chunk.quiz.choices.map(c => {
              const picked = quizAnswer === c.key;
              const correct = c.key === chunk.quiz.answer;
              const showGood = submitted && correct;
              const showBad = submitted && picked && !correct;
              return <button key={c.key} disabled={submitted} onClick={()=>setQuizAnswer(c.key)} className="hov" style={{
                display:'flex', gap:12, alignItems:'flex-start', padding:'10px 12px', textAlign:'left', cursor:submitted?'default':'pointer',
                background: showGood?'var(--good-soft)':showBad?'var(--bad-soft)':picked?'var(--accent-faint)':'var(--surface-2)',
                border: `1px solid ${showGood?'var(--good-border)':showBad?'var(--bad-border)':picked?'var(--accent-border)':'var(--border)'}`,
                borderRadius:3,
              }}>
                <span className="mono" style={{ fontWeight:600, fontSize:12, width:14, color:showGood?'var(--good)':showBad?'var(--bad)':'var(--ink-faint)' }}>{c.key}</span>
                <span style={{ flex:1, fontSize:13, color:'var(--ink)' }}>{c.text}</span>
                {showGood ? <span className="mono" style={{ fontSize:10, color:'var(--good)', fontWeight:600 }}>CORRECT</span> : null}
              </button>;
            })}
          </div>
          {submitted ? <div style={{ marginTop:14, padding:12, background:'var(--surface-2)', borderLeft:'2px solid var(--accent)', borderRadius:3 }}>
            <div className="mono eyebrow">EXPLANATION</div>
            <div style={{ fontSize:13, color:'var(--ink-dim)', marginTop:6, lineHeight:1.6 }}>{chunk.quiz.explanation}</div>
          </div> : null}
          <div style={{ marginTop:14, display:'flex', gap:8 }}>
            {!submitted ? <Btn variant="primary" disabled={!quizAnswer} onClick={()=>setSubmitted(true)}>Submit answer</Btn>
              : <Btn variant="primary" icon={<Icon name="arrow-right" size={13}/>} onClick={next} disabled={chunkIdx===chunks.length-1}>Continue reading</Btn>}
            <Btn variant="ghost" size="md">Explain differently</Btn>
            <Btn variant="ghost" size="md">Ask a question</Btn>
          </div>
        </Card>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <Card>
          <div className="mono eyebrow">CHUNK PROGRESS</div>
          <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:5 }}>
            {chunks.map((c, i) => <button key={c.id} onClick={()=>{setChunkIdx(i); setSubmitted(false); setQuizAnswer(null);}} className="hov" style={{
              display:'grid', gridTemplateColumns:'18px 1fr 34px', gap:8, alignItems:'center',
              padding:'7px 9px', borderRadius:3, cursor:'pointer', textAlign:'left',
              background: i===chunkIdx?'var(--accent-faint)':'transparent',
              border: i===chunkIdx?'1px solid var(--accent-border)':'1px solid transparent',
            }}>
              <div style={{ width:14, height:14, borderRadius:7, background: i<chunkIdx?'var(--good)':i===chunkIdx?'var(--accent)':'var(--surface-2)', border: i>chunkIdx?'1px solid var(--border-hi)':'none', display:'flex', alignItems:'center', justifyContent:'center' }}>
                {i<chunkIdx ? <Icon name="check" size={9} color="#fff"/> : null}
              </div>
              <span style={{ fontSize:12, color:i<=chunkIdx?'var(--ink)':'var(--ink-dim)' }}>{c.ref}</span>
              <span className="mono tabular" style={{ fontSize:10, color:'var(--ink-faint)' }}>{c.estMin}m</span>
            </button>)}
          </div>
        </Card>
        <Card>
          <div className="mono eyebrow">THIS SESSION</div>
          <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:8, fontSize:12 }}>
            <KV k="Time in book" v="34 min"/>
            <KV k="Chunks read" v={`${chunkIdx}/${chunks.length}`}/>
            <KV k="Checkpoints" v="3/4 correct"/>
            <KV k="Hours logged to FAR" v="+0.57"/>
          </div>
        </Card>
        <Card>
          <div className="mono eyebrow">SOURCE</div>
          <div style={{ fontSize:13, color:'var(--ink)', marginTop:6, fontWeight:500 }}>Becker CPA Review · FAR</div>
          <div className="mono" style={{ fontSize:11, color:'var(--ink-faint)', marginTop:3 }}>Chapter 7 · Revenue Recognition · p.134–167</div>
        </Card>
      </div>
    </div>
  </div>;
}

Object.assign(window, { ScreenStudyTextbook });

function AnkiBrowse() {
  const [q, setQ] = React.useState('');
  const [section, setSection] = React.useState('all');
  const [deck, setDeck] = React.useState('all');
  const [sort, setSort] = React.useState('due');
  const [selected, setSelected] = React.useState(null);
  const [addOpen, setAddOpen] = React.useState(false);
  const [confirmDel, setConfirmDel] = React.useState(null);
  const [editing, setEditing] = React.useState(null); // cardId or null
  const [toast, setToast] = React.useState(null);

  // Build initial list once
  const base = window.ANKI_CARDS;
  const makeInitial = () => {
    const synth = [];
    const topics = ['Revenue recognition','Leases','Deferred tax','Consolidation','Audit sampling','Risk assessment','Individual tax','Passthrough entities','SOX controls','Inventory valuation','Impairment','Cash flow stmt'];
    const types = ['definition','formula','cloze','worked example','mnemonic'];
    const sections = ['FAR','REG','AUD','TCP'];
    for (let i = 0; i < 40; i++) {
      synth.push({
        id: 1000+i,
        section: sections[i % sections.length],
        topic: topics[i % topics.length],
        type: types[i % types.length],
        front: `Card ${1000+i} · ${topics[i % topics.length]} · ${types[i % types.length]} prompt line rendered from template`,
        back: 'Answer body…',
        reviews: (i*7) % 20,
        interval: `${(i%12)+1}d`,
        ease: (2.0 + ((i*13)%60)/100).toFixed(2),
        lapses: i%3,
        created: `2026-0${(i%6)+1}-${String((i*5)%27+1).padStart(2,'0')}`,
        due: i%7===0 ? 'today' : i%3===0 ? '+1d' : i%4===0 ? 'new' : `+${(i%12)+2}d`,
        tags: [sections[i%sections.length].toLowerCase(), topics[i%topics.length].split(' ')[0].toLowerCase()],
      });
    }
    return [...base.map(c => ({ ...c, due:'today', tags:[c.section.toLowerCase(), c.topic.split(' ')[0].toLowerCase()] })), ...synth];
  };
  const [cards, setCards] = React.useState(makeInitial);

  const flash = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  const addCard = (c) => {
    const id = Math.max(...cards.map(x => x.id)) + 1;
    const newCard = {
      id, section:c.section, topic:c.topic || 'Custom', type:c.type || 'definition',
      front:c.front, back:c.back, reviews:0, interval:'—', ease:'2.50', lapses:0,
      created: new Date().toISOString().slice(0,10), due:'new', tags:[c.section.toLowerCase()],
    };
    setCards(cs => [newCard, ...cs]);
    setSelected(id);
    setAddOpen(false);
    flash('Card added · queued as new');
  };

  const deleteCard = (id) => {
    setCards(cs => cs.filter(c => c.id !== id));
    if (selected === id) setSelected(null);
    setConfirmDel(null);
    flash('Card deleted');
  };

  const saveEdit = (id, front, back) => {
    setCards(cs => cs.map(c => c.id === id ? { ...c, front, back } : c));
    setEditing(null);
    flash('Card updated');
  };

  let items = cards.filter(c => {
    if (section !== 'all' && c.section !== section) return false;
    if (deck !== 'all' && c.type !== deck) return false;
    if (q && !(`${c.front} ${c.topic} ${(c.tags||[]).join(' ')}`.toLowerCase().includes(q.toLowerCase()))) return false;
    return true;
  });
  items = [...items].sort((a,b) => {
    if (sort === 'due') {
      const order = { today:0, '+1d':1, new:5 };
      const va = order[a.due] ?? (parseInt(a.due)||9); const vb = order[b.due] ?? (parseInt(b.due)||9);
      return va - vb;
    }
    if (sort === 'ease') return parseFloat(a.ease) - parseFloat(b.ease);
    if (sort === 'reviews') return b.reviews - a.reviews;
    if (sort === 'lapses') return b.lapses - a.lapses;
    return 0;
  });

  const detail = selected != null ? cards.find(c => c.id === selected) : items[0];

  return <div style={{ display:'grid', gridTemplateColumns:'1fr 380px', gap:14, position:'relative' }}>
    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
      {/* Search + filters */}
      <Card pad={0}>
        <div style={{ padding:'10px 14px', display:'grid', gridTemplateColumns:'1fr auto auto', gap:10, alignItems:'center', borderBottom:'1px solid var(--border)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, height:34, padding:'0 10px', background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:3 }}>
            <Icon name="search" size={13} color="var(--ink-faint)"/>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search card fronts, topics, tags…" style={{ flex:1, border:'none', background:'transparent', outline:'none', color:'var(--ink)', fontSize:13 }}/>
            {q ? <button onClick={()=>setQ('')} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--ink-faint)' }}><Icon name="x" size={12}/></button> : null}
          </div>
          <div className="mono tabular" style={{ fontSize:11, color:'var(--ink-dim)' }}>{items.length} / {cards.length} cards</div>
          <Btn size="sm" variant="primary" icon={<Icon name="plus" size={11}/>} onClick={()=>setAddOpen(true)}>New card</Btn>
        </div>
        <div style={{ padding:'10px 14px', display:'flex', flexWrap:'wrap', gap:14, alignItems:'center', borderBottom:'1px solid var(--border)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <span className="mono eyebrow">SECTION</span>
            {['all','FAR','REG','AUD','TCP'].map(s => <Btn key={s} size="sm" variant="ghost" active={section===s} onClick={()=>setSection(s)}>{s==='all'?'All':s}</Btn>)}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <span className="mono eyebrow">TYPE</span>
            {['all','definition','formula','cloze','worked example','mnemonic'].map(d => <Btn key={d} size="sm" variant="ghost" active={deck===d} onClick={()=>setDeck(d)}>{d==='all'?'All':d}</Btn>)}
          </div>
          <span style={{ flex:1 }}/>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <span className="mono eyebrow">SORT</span>
            {[['due','Due'],['ease','Lowest ease'],['reviews','Most reviewed'],['lapses','Most lapses']].map(([k,l]) => <Btn key={k} size="sm" variant="ghost" active={sort===k} onClick={()=>setSort(k)}>{l}</Btn>)}
          </div>
        </div>

        {/* Table header */}
        <div style={{ display:'grid', gridTemplateColumns:'50px 1fr 150px 80px 70px 70px 70px 70px', gap:10, padding:'10px 14px', borderBottom:'1px solid var(--border)', background:'var(--surface-2)' }}>
          {['SECT','CARD FRONT','TOPIC','TYPE','DUE','REVIEWS','EASE','LAPSES'].map((h,i) => <div key={i} className="mono eyebrow">{h}</div>)}
        </div>

        {/* Rows — scrollable */}
        <div style={{ maxHeight:540, overflowY:'auto' }}>
          {items.map((c, i) => {
            const active = detail && c.id === detail.id;
            return <button key={c.id} onClick={()=>setSelected(c.id)} className="hov" style={{
              width:'100%', display:'grid', gridTemplateColumns:'50px 1fr 150px 80px 70px 70px 70px 70px', gap:10,
              padding:'10px 14px', alignItems:'center', textAlign:'left', cursor:'pointer',
              background: active?'var(--accent-faint)':'transparent',
              border:'none', borderBottom:'1px solid var(--border)',
              borderLeft: active?'2px solid var(--accent)':'2px solid transparent',
            }}>
              <SectionBadge section={c.section} size="xs"/>
              <div style={{ fontSize:12, color:'var(--ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{c.front}</div>
              <div className="mono" style={{ fontSize:11, color:'var(--ink-dim)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{c.topic}</div>
              <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)' }}>{c.type}</div>
              <div className="mono tabular" style={{ fontSize:11, color: c.due==='today'?'var(--accent)':c.due==='new'?'var(--good)':'var(--ink-dim)' }}>{c.due}</div>
              <div className="mono tabular" style={{ fontSize:11, color:'var(--ink-dim)' }}>{c.reviews}</div>
              <div className="mono tabular" style={{ fontSize:11, color: parseFloat(c.ease)<2.1?'var(--bad)':parseFloat(c.ease)<2.4?'var(--warn)':'var(--ink-dim)' }}>{c.ease}</div>
              <div className="mono tabular" style={{ fontSize:11, color: c.lapses>1?'var(--bad)':'var(--ink-dim)' }}>{c.lapses}</div>
            </button>;
          })}
          {items.length === 0 ? <div style={{ padding:40, textAlign:'center', color:'var(--ink-faint)', fontSize:13 }}>No cards match those filters.</div> : null}
        </div>
      </Card>
    </div>

    {/* Detail panel */}
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      {detail ? <>
        <Card>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <SectionBadge section={detail.section} size="sm"/>
            <span className="mono" style={{ fontSize:11, color:'var(--ink-faint)' }}>{detail.topic} · {detail.type}</span>
          </div>
          <div className="mono eyebrow" style={{ marginTop:14 }}>FRONT</div>
          <div style={{ fontFamily:'var(--font-serif)', fontSize:15, color:'var(--ink)', marginTop:6, lineHeight:1.55 }}>{detail.front}</div>
          <Divider style={{ margin:'14px 0' }}/>
          <div className="mono eyebrow">BACK</div>
          <div style={{ fontFamily:'var(--font-serif)', fontSize:14, color:'var(--ink-dim)', marginTop:6, lineHeight:1.6 }}>{detail.back || '—'}</div>
        </Card>
        <Card>
          <div className="mono eyebrow">STATS</div>
          <div style={{ marginTop:10, display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, fontSize:12 }}>
            <KV k="Interval" v={detail.interval}/>
            <KV k="Ease" v={detail.ease}/>
            <KV k="Reviews" v={detail.reviews}/>
            <KV k="Lapses" v={detail.lapses}/>
            <KV k="Created" v={detail.created}/>
            <KV k="Due" v={detail.due}/>
          </div>
        </Card>
        <Card>
          <div className="mono eyebrow">ACTIONS</div>
          <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:6 }}>
            <Btn size="sm" variant="primary" icon={<Icon name="play" size={11}/>}>Study this card now</Btn>
            <Btn size="sm" variant="ghost" icon={<Icon name="refresh" size={11}/>}>Reset schedule</Btn>
            <Btn size="sm" variant="ghost" icon={<Icon name="note" size={11}/>}>Edit card</Btn>
            <Btn size="sm" variant="ghost" icon={<Icon name="book-open" size={11}/>}>Open source passage</Btn>
            <Btn size="sm" variant="ghost" icon={<Icon name="trash" size={11}/>}>Suspend</Btn>
          </div>
        </Card>
      </> : null}
    </div>
  </div>;
}

    if (state !== 'recording') return;

    const lines = [
      'Okay so the mnemonic for ASC 606 is ICDAR — ',
      'identify contract, identify obligations, determine price, ',
      'allocate proportionally, recognize as satisfied. ',
      'The part I keep forgetting is proportional allocation when SSPs don\'t sum to the price — ',
      'you compute the ratio, not the difference.',
    ];
    setTranscript(lines.slice(0, Math.min(lines.length, Math.ceil(sec/2))).join(''));
  }, [sec, state]);

  const mm = String(Math.floor(sec/60)).padStart(2,'0');
  const ss = String(sec%60).padStart(2,'0');

  return <div onClick={onClose} style={{
    position:'fixed', inset:0, background:'rgba(26,23,20,0.72)', backdropFilter:'blur(6px)',
    zIndex:9000, display:'flex', alignItems:'center', justifyContent:'center', padding:20,
  }}>
    <div onClick={e=>e.stopPropagation()} style={{
      width:'100%', maxWidth:520, background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:4, boxShadow:'0 24px 60px rgba(0,0,0,0.25)', overflow:'hidden',
    }}>
      <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10 }}>
        <Icon name="mic" size={14} color="var(--accent)"/>
        <div>
          <div className="mono eyebrow">VOICE NOTE · attach to card</div>
          <div style={{ fontSize:12, color:'var(--ink-dim)', marginTop:2, maxWidth:380, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{card.front}</div>
        </div>
        <span style={{ flex:1 }}/>
        <button onClick={onClose} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--ink-faint)' }}><Icon name="x" size={16}/></button>
      </div>

      <div style={{ padding:'28px 24px', display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
        {/* Big record button */}
        <button
          onClick={() => setState(s => s==='armed'?'recording':s==='recording'?'review':'armed')}
          style={{
            width:92, height:92, borderRadius:46, border:'none', cursor:'pointer',
            background: state==='recording' ? 'var(--bad)' : state==='review' ? 'var(--good)' : 'var(--accent)',
            color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow: state==='recording'?'0 0 0 6px rgba(176,28,35,0.18), 0 0 0 12px rgba(176,28,35,0.08)':'0 4px 14px rgba(0,0,0,0.15)',
            transition:'all 0.18s',
          }}
        >
          <Icon name={state==='recording'?'stop':state==='review'?'check':'mic'} size={30} color="#fff"/>
        </button>

        <div style={{ textAlign:'center' }}>
          <div className="mono tabular" style={{ fontSize:28, fontWeight:300, color:'var(--ink)', letterSpacing:'-0.02em' }}>{mm}:{ss}</div>
          <div className="mono" style={{ fontSize:11, color: state==='recording'?'var(--bad)':'var(--ink-faint)', marginTop:2, letterSpacing:'0.08em', textTransform:'uppercase' }}>
            {state==='armed'?'● Tap to start recording':state==='recording'?'● Recording · tap to stop':'● Review — tap to re-record'}
          </div>
        </div>

        {/* Waveform — speech-reactive envelope (amplitude bursts + pauses) */}
        <div style={{ width:'100%', height:44, display:'flex', alignItems:'center', gap:2 }}>
          {Array.from({length:60}).map((_,i) => {
            const active = state==='recording' && i < (sec*4)%60;
            const done = state==='review' && i < 50;
            // Speech envelope: slow syllabic modulation × burst gating × noise
            const t = sec * 0.9 + i * 0.12;
            const syllabic = 0.5 + 0.5 * Math.sin(t * 4.2);                   // ~4Hz syllable rate
            const burstGate = 0.5 + 0.5 * Math.sin(sec * 0.18 + i * 0.02);    // long on/off pauses
            const pause = burstGate < 0.22 ? 0.08 : 1;                        // brief silence gaps
            const noise = 0.55 + 0.45 * Math.abs(Math.sin(t * 11.3 + i));     // fine grain
            const envelope = state === 'recording' ? syllabic * pause * noise : 0.5;
            const h = 4 + envelope * 36;
            return <div key={i} style={{
              flex:1, height:`${h}px`,
              background: active || done ? 'var(--accent)' : 'var(--border-hi)',
              opacity: active || done ? (0.55 + envelope * 0.45) : 0.35,
              borderRadius:1,
              transition:'height 120ms ease-out, opacity 120ms ease-out',
            }}/>;
          })}
        </div>

        {/* Live transcript */}
        {transcript ? <div style={{
          width:'100%', padding:'12px 14px', background:'var(--surface-2)', border:'1px solid var(--border)',
          borderRadius:3, fontSize:13, color:'var(--ink)', lineHeight:1.55,
          fontFamily:'var(--font-serif)', fontStyle:'italic', maxHeight:110, overflowY:'auto',
        }}>
          <div className="mono eyebrow" style={{ fontStyle:'normal', marginBottom:6 }}>LIVE TRANSCRIPT</div>
          {transcript}<span style={{ color:'var(--accent)' }}>{state==='recording'?' ●':''}</span>
        </div> : null}
      </div>

      <div style={{ padding:'12px 18px', borderTop:'1px solid var(--border)', display:'flex', gap:8, background:'var(--surface-2)' }}>
        {state==='review' ? <>
          <Btn variant="ghost" size="sm" icon={<Icon name="refresh" size={11}/>} onClick={()=>{setState('armed'); setSec(0); setTranscript('');}}>Retry</Btn>
          <span style={{ flex:1 }}/>
          <Btn variant="ghost" size="sm" onClick={onClose}>Discard</Btn>
          <Btn variant="primary" size="sm" icon={<Icon name="check" size={11}/>} onClick={onClose}>Save to card</Btn>
        </> : <>
          <span className="mono" style={{ fontSize:11, color:'var(--ink-faint)', alignSelf:'center' }}>Transcribed locally · saved with timestamp</span>
          <span style={{ flex:1 }}/>
          <Btn variant="ghost" size="sm" onClick={onClose}>Cancel</Btn>
        </>}
      </div>
    </div>
  </div>;
}

      </div>
      <AutoGrowTextarea
        value={routineText}
        onChange={e=>setRoutineText(e.target.value)}

      <div style={{ marginTop:10, display:'flex', gap:6 }}>

        <Btn variant="ghost" onClick={()=>showToast(routineText ? 'XML valid · 3 blocks · 7 tasks' : 'Nothing to validate — paste XML first', routineText?'ok':'bad')}>Validate</Btn>

    {/* Discord-style drag overlay */}
