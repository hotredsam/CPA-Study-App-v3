              <Toggle on={true} onChange={()=>{}}/>
            </div>
            <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)', marginTop:4, lineHeight:1.5 }}>Wait for provider downtime windows. Additional ~30% off. Can take several days during high demand.</div>
          </div>
          <div style={{ height:1, background:'var(--border)' }}/>
          <div>
            <div style={{ fontSize:12, color:'var(--ink)' }}>Concurrency</div>
            <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)', marginTop:2 }}>Parallel chunk requests (live mode only)</div>
            <div style={{ display:'flex', gap:4, marginTop:8 }}>
              {['4','8','16','32'].map(n => <button key={n} className="hov" style={{ flex:1, padding:'6px 0', border:'1px solid var(--border)', borderRadius:3, background: n==='16'?'var(--accent-faint)':'var(--surface-2)', color: n==='16'?'var(--accent)':'var(--ink)', fontFamily:'var(--font-mono)', fontSize:11, cursor:'pointer' }}>{n}</button>)}
            </div>
          </div>
          <div style={{ height:1, background:'var(--border)' }}/>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            <div>
              <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)', letterSpacing:'0.08em' }}>EST. COST</div>
              <div style={{ fontFamily:'var(--font-serif)', fontSize:20, marginTop:2 }}>$2.40</div>
              <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)' }}>12 books · batch + off-peak</div>
            </div>
            <div>
              <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)', letterSpacing:'0.08em' }}>WITHOUT</div>
              <div style={{ fontFamily:'var(--font-serif)', fontSize:20, marginTop:2, color:'var(--ink-faint)' }}>$7.10</div>
              <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)' }}>live, no batch</div>
            </div>
          </div>
        </div>
      </div>
    </Card>
    <Card pad={0}>
    <div style={{ padding:'12px 16px', borderBottom:'1px solid var(--border)' }} className="mono eyebrow">TEXTBOOK INDEXING · 15 OPTIONS</div>
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr' }}>
      {opts.map((o,i) => <div key={o.k} style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:10, padding:'12px 16px', borderBottom:'1px solid var(--border)', borderRight: (i%2===0)?'1px solid var(--border)':'none', alignItems:'center' }}>
        <div>
          <div style={{ fontSize:12, color:'var(--ink)' }}>{o.k}</div>
          <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)', marginTop:2 }}>{o.sub}</div>
        </div>
        {o.ctrl==='toggle' ? <Toggle on={o.v} onChange={()=>{}}/>
          : o.ctrl==='select' ? <span className="mono" style={{ fontSize:10, color:'var(--ink-dim)' }}>{o.v}</span>
          : <span className="mono tabular" style={{ fontSize:11, color:'var(--ink)' }}>{o.v}</span>}
      </div>)}
    </div>
  </Card>
  </div>;
}

function SettingsDanger() {
  return <div style={{ maxWidth:680 }}>
    <Card style={{ borderColor:'var(--bad-border)' }}>
      <div className="mono eyebrow" style={{ color:'var(--bad)' }}>DANGER ZONE</div>
      <div style={{ marginTop:14, display:'flex', flexDirection:'column', gap:14 }}>
        {[
          { k:'Reset hours counter', sub:'Zero your cumulative study hours. Does not affect recordings or Anki.', btn:'Reset hours', variant:'danger' },
          { k:'Re-index all textbooks', sub:'Rebuild vector store from scratch. ~45 min for your 12 books.', btn:'Re-index all', variant:'danger' },
          { k:'Delete all recordings', sub:'Permanently deletes all past recordings and their transcripts.', btn:'Delete recordings', variant:'danger' },
          { k:'Reset Anki deck', sub:'All intervals return to 0. Keeps cards, resets FSRS state.', btn:'Reset deck', variant:'danger' },
          { k:'Wipe everything', sub:'Factory reset. Deletes hours, recordings, cards, textbooks, notes. Irreversible.', btn:'Wipe', variant:'danger' },
        ].map(r => <div key={r.k} style={{ display:'grid', gridTemplateColumns:'1fr 160px', gap:16, alignItems:'center', padding:'10px 0', borderTop:'1px solid var(--bad-border)' }}>
          <div>
            <div style={{ fontSize:13, color:'var(--ink)' }}>{r.k}</div>
            <div style={{ fontSize:11, color:'var(--ink-dim)', marginTop:3, lineHeight:1.5 }}>{r.sub}</div>
          </div>
          <Btn variant="danger" icon={<Icon name="trash" size={12}/>}>{r.btn}</Btn>
        </div>)}
      </div>
    </Card>
  </div>;
}

Object.assign(window, { ScreenTextbooks, ScreenTextbookView, ScreenSettings });


</script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "paper",
  "accentHue": 18,
  "density": "comfortable",
  "serif": "Instrument Serif"
}/*EDITMODE-END*/;

function Sidebar({ screen, nav }) {
  const items = [
    { id:'dashboard', label:'Dashboard', icon:'dashboard', key:'h' },
    { id:'record', label:'Record', icon:'mic', key:'r' },
    { id:'pipeline', label:'Pipeline', icon:'activity', key:'s' },
    { id:'review', label:'Review', icon:'list', key:'v' },
    { id:'topics', label:'Topics', icon:'topics', key:'y' },
    { id:'study-tb', label:'Study Textbook', icon:'book-open', key:'u' },
    { id:'anki', label:'Anki', icon:'cards', key:'a' },
    { id:'textbooks', label:'Library', icon:'book', key:'l' },
    { id:'settings', label:'Settings', icon:'settings', key:'g' },
  ];
  return <nav className="side">
    <div style={{ padding:'18px 16px', display:'flex', alignItems:'center', gap:10, borderBottom:'1px solid var(--border)' }}>
      <Logo size={30}/>
      <div>
        <div style={{ fontSize:14, fontWeight:500, color:'var(--ink)', letterSpacing:'-0.01em' }}>Study Servant</div>
        <div className="mono" style={{ fontSize:10, color:'var(--ink-faint)', letterSpacing:'0.08em' }}>CPA · 583 h</div>
      </div>
    </div>
    <div style={{ padding:'10px 8px', flex:1, overflowY:'auto' }}>
      {items.map(it => {
        const on = screen === it.id;
        return <button key={it.id} onClick={()=>nav(it.id)} className="hov" style={{
          width:'100%', display:'grid', gridTemplateColumns:'16px 1fr 18px', gap:10, alignItems:'center',
          padding:'8px 10px', borderRadius:3, cursor:'pointer', marginBottom:2,
          background: on?'var(--accent-faint)':'transparent',
          color: on?'var(--ink)':'var(--ink-dim)',
          fontWeight: on?500:400,
          border:'1px solid ' + (on?'var(--accent-border)':'transparent'),
        }}>
          <Icon name={it.icon} size={15}/>
          <span style={{ fontSize:13, textAlign:'left' }}>{it.label}</span>
          <span className="mono" style={{ fontSize:9, color:'var(--ink-faint)', textAlign:'right' }}>{it.key}</span>
        </button>;
      })}
    </div>
    <div style={{ borderTop:'1px solid var(--border)', padding:'12px 14px' }}>
      <div className="mono eyebrow">LIVE</div>
      <div style={{ marginTop:6, fontSize:11, color:'var(--ink-dim)' }}>
        <span className="pulse-dot" style={{ display:'inline-block', width:6, height:6, borderRadius:3, background:'var(--accent)', marginRight:6 }}/>
        {window.LIVE_PIPELINES.length} recording{window.LIVE_PIPELINES.length===1?'':'s'} processing
      </div>
    </div>
  </nav>;
}

function TweaksPanel({ tweaks, onChange, onClose }) {
  return <div style={{ position:'fixed', bottom:20, right:20, width:300, zIndex:100,
    background:'var(--surface)', border:'1px solid var(--border-hi)', borderRadius:4,
    boxShadow:'0 20px 50px -10px rgba(0,0,0,0.25)', padding:16,
  }}>
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
      <div className="mono eyebrow">TWEAKS</div>
      <Btn size="sm" variant="subtle" icon={<Icon name="x" size={11}/>} onClick={onClose}></Btn>
    </div>
    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
      <div>
        <div style={{ fontSize:11, color:'var(--ink-faint)', marginBottom:4 }}>Theme</div>
        <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
          {['paper','night','sepia','sakura','scientific'].map(t =>
            <Btn key={t} size="sm" variant="ghost" active={tweaks.theme===t} onClick={()=>onChange('theme', t)}>{t}</Btn>)}
        </div>
      </div>
      <div>
        <div style={{ fontSize:11, color:'var(--ink-faint)', marginBottom:4 }}>Accent hue · {tweaks.accentHue}°</div>
        <input type="range" min="0" max="360" value={tweaks.accentHue} onChange={e=>onChange('accentHue', parseInt(e.target.value))} style={{ width:'100%' }}/>
      </div>
      <div>
        <div style={{ fontSize:11, color:'var(--ink-faint)', marginBottom:4 }}>Density</div>
        <div style={{ display:'flex', gap:4 }}>
          {['comfortable','compact'].map(d =>
            <Btn key={d} size="sm" variant="ghost" active={tweaks.density===d} onClick={()=>onChange('density', d)}>{d}</Btn>)}
        </div>
      </div>
    </div>
  </div>;
}

function App() {
  const [screen, setScreen] = React.useState(() => localStorage.getItem('css-screen') || 'dashboard');
  const [prevScreen, setPrevScreen] = React.useState(null);
  const [tweaksOn, setTweaksOn] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [settingsTab, setSettingsTab] = React.useState('study');
  const [toast, setToast] = React.useState(null);

  React.useEffect(() => {
    const onToast = (e) => {
      setToast(e.detail);
      clearTimeout(window.__toast_timer);
      window.__toast_timer = setTimeout(()=>setToast(null), 2800);
    };
    window.addEventListener('servant:toast', onToast);
    return () => window.removeEventListener('servant:toast', onToast);
  }, []);

  const nav = (s) => {
    setPrevScreen(p => screen === s ? p : screen);
    setScreen(s);
    localStorage.setItem('css-screen', s);
    window.scrollTo(0,0);
  };

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
    document.documentElement.style.setProperty('--accent-hue', tweaks.accentHue);
  }, [tweaks]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onTweakChange = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{[k]: v} }, '*');
  };

  React.useEffect(() => {
    let buffer = '';
    const onKey = (e) => {
      if (e.target.matches('input, textarea, select')) return;
      const key = e.key.toLowerCase();
      if (key === 'g') { buffer = 'g'; setTimeout(()=>buffer='', 1000); return; }
      if (buffer === 'g') {
        buffer = '';
        const m = { h:'dashboard', r:'record', s:'pipeline', v:'review', y:'topics', u:'study-tb', a:'anki', l:'textbooks', t:'settings' };
        if (m[key]) nav(m[key]);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  let Screen;
  switch (screen) {
    case 'record': Screen = window.ScreenRecord; break;
    case 'pipeline': Screen = window.ScreenPipeline; break;
    case 'review': Screen = window.ScreenReview; break;
    case 'topics': Screen = window.ScreenTopics; break;
    case 'study-tb': Screen = window.ScreenStudyTextbook; break;
    case 'anki': Screen = window.ScreenAnki; break;
    case 'textbooks': Screen = window.ScreenTextbooks; break;
    case 'textbook-view': Screen = (props) => <window.ScreenTextbookView {...props} prevScreen={prevScreen}/>; break;
    case 'settings': Screen = (props) => <window.ScreenSettings {...props} tweaks={tweaks} onTweakChange={onTweakChange} tab={settingsTab} setTab={setSettingsTab}/>; break;
    default: Screen = window.ScreenDashboard;
  }

  return <div className="app-shell" data-screen-label={screen}>
    <Sidebar screen={screen} nav={nav}/>
    <main className="main">
      <Screen nav={nav}/>
    </main>
    {toast ? <div style={{
      position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', zIndex:10002,
      padding:'10px 16px', borderRadius:3,
      background: toast.kind==='bad' ? 'var(--bad)' : toast.kind==='ok' ? 'var(--ink)' : 'var(--ink-dim)',
      color:'var(--surface)', fontSize:13, boxShadow:'0 10px 30px rgba(0,0,0,0.25)',
      display:'flex', alignItems:'center', gap:10, maxWidth:480,
    }}>
      <Icon name={toast.kind==='bad'?'x':'check'} size={13} color="currentColor"/>
      <span>{toast.msg}</span>
    </div> : null}
  </div>;
}

// Mount after all component scripts load
window.addEventListener('load', () => {
  setTimeout(() => {
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  }, 50);
});
</script>
</body>
</html>
